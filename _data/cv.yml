    Experience:
      - company: Transportation Cybersecurity and Resiliency Center, Purdue University
        position: Postdoctoral Associate
        location: West Lafayette, IN
        start_date: 2025-01
        end_date: Present
        highlights:
          - "Lead research connecting METS-R SIM, CARLA, and an autonomous driving stack for controlled, repeatable scenario testing."
          - "Develop amortized samplers for policy and control verification in simulated environments, with emphasis on rare, high-impact scenarios."
          - "Study adversarial risks in autonomous mobility systems, including booking attacks, emergent adversarial driving maneuvers, and cybersecurity challenges for next-generation road transportation."

      - company: Urban Mobility, Network and Intelligence Lab, Purdue University
        position: Graduate Research Assistant
        location: West Lafayette, IN
        start_date: 2018-08
        end_date: 2024-12
        highlights:
          - "Conducted research on pricing and fleet relocation, leading to publications in Transportation Research Part B and Transportation Research Part C."
          - "Served as student lead for the U.S. Department of Energy METS-R project and contributed substantially to METS-R SIM, a city-scale multimodal electric vehicle simulator."
          - "Analyzed large-scale GPS and trajectory data to study evacuation, return, pandemic-era mobility, and transportation hub operations."

    Education:
      - institution: Purdue University
        location: West Lafayette, IN
        area: Transportation and Infrastructure Systems Engineering
        studyType: Ph.D.
        start_date: 2018
        end_date: 2024
        highlights:
          - "Dissertation: Towards an Efficient and Secure Ride-hailing Service."
          - "Selected coursework: Reinforcement Learning, Real Analysis and Measure Theory, Security Analytics."

      - institution: Tongji University
        location: Shanghai, China
        area: Transportation Planning and Management; Transportation Engineering
        studyType: M.S.E. and B.S.
        start_date: 2011
        end_date: 2018

    Selected Research and Open-Source Leadership:
      - name: "METS-R SIM: Open-Source Multimodal Electric Mobility Simulator"
        summary: U.S. Department of Energy project
        highlights:
          - "Led development of a city-scale simulation platform for Multi-modal Energy-optimal Trip Scheduling in Real-time, supporting shared autonomous electric vehicles, taxis, buses, charging operations, routing, and service evaluation."
          - "Used the platform to evaluate energy, congestion, and service impacts of operational algorithms for electric mobility services and transportation hubs."

      - name: Secure and Efficient Ride-Hailing Systems
        summary: Ph.D. research
        highlights:
          - "Designed scalable reinforcement learning approaches for dynamic pricing and data-driven relocation policies for mobility-on-demand systems."
          - "Quantified the network-level risk of adversarial booking attacks against autonomous mobility-on-demand services."

      - name: Large-Scale Mobility Analytics for Disasters and Recovery
        summary: Interdisciplinary research
        highlights:
          - "Modeled evacuation and return behavior during Hurricane Ida under compound risks with COVID-19."
          - "Built evidence from smartphone GPS and trajectory data to study transportation resilience, demand recovery, and traveler response."

